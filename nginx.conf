server {
  listen 80;
  listen 3000;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location = /healthz {
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location / {
    try_files $uri $uri/ $uri.html =404;
  }

  location ~* \.(?:css|js|mjs|jpg|jpeg|gif|png|svg|ico|webp|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
