name: Publish blog draft

on:
  workflow_dispatch:
    inputs:
      draft_filename:
        description: 'Draft filename from content/drafts, for example 2026-06-04-health-tips.md'
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish draft
        run: npm run content:publish -- "${{ inputs.draft_filename }}"

      - name: Verify build
        run: npm run build

      - name: Commit published post
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/posts content/drafts
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Publish blog draft: ${{ inputs.draft_filename }}"
          git push
